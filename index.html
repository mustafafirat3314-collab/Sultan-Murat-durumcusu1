<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sultan Murat Dürümcüsü - Menü</title>
    <style>
        :root { --primary: #a34e25; --bg: #fff5eb; --card: #ffffff; --green: #25D366; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: #333; padding-bottom: 100px; }
        .header { background-color: var(--primary); color: white; text-align: center; padding: 35px 15px; border-radius: 0 0 30px 30px; }
        .logo-circle { background: white; width: 75px; height: 75px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: var(--primary); font-size: 36px; font-weight: bold; border: 3px solid rgba(255,255,255,0.3); }
        .header h1 { margin: 5px 0; font-size: 26px; text-transform: uppercase; letter-spacing: 1px; }
        .header p { margin: 0; font-style: italic; opacity: 0.9; font-size: 14px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .category-title { border-left: 5px solid var(--primary); padding-left: 12px; margin: 30px 0 15px; font-weight: bold; color: var(--primary); font-size: 22px; text-transform: uppercase; }
        .item-card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 12px rgba(163, 78, 37, 0.08); border: 1px solid rgba(163, 78, 37, 0.05); }
        .item-info h4 { margin: 0; font-size: 17px; color: #222; }
        .item-info p { margin: 6px 0 0; color: var(--primary); font-weight: bold; font-size: 16px; }
        .add-btn { background: var(--green); color: white; border: none; width: 42px; height: 42px; border-radius: 12px; font-size: 24px; cursor: pointer; transition: transform 0.1s; }
        .add-btn:active { transform: scale(0.9); }
        .cart-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: white; padding: 18px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -5px 25px rgba(0,0,0,0.15); cursor: pointer; max-width: 470px; margin: auto; border: 2px solid var(--green); }
        .cart-info { display: flex; align-items: center; gap: 10px; font-weight: bold; color: #333; font-size: 16px; }
        .cart-total { color: var(--green); font-weight: 800; font-size: 18px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-circle">S</div>
    <h1>Sultan Murat Dürümcüsü</h1>
    <p>Damaklarda Taht Kuran Lezzetler</p>
</div>

<div class="container" id="menu-container"></div>

<div class="cart-bar" onclick="sendWhatsApp()">
    <div class="cart-info">🛒 SEPETİM (<span id="count">0</span>)</div>
    <div id="total" class="cart-total">0 TL</div>
</div>

<script>
    const menu = {
        "ÇORBALAR": [
            { name: "Mercimek Çorbası", price: 100 },
            { name: "Az Mercimek Çorbası", price: 50 }
        ],
        "DÜRÜMLER": [
            { name: "Adana Dürüm", price: 210 },
            { name: "Urfa Dürüm", price: 210 },
            { name: "Tavuk Dürüm", price: 210 },
            { name: "Et Dürüm (Şiş)", price: 230 }
        ],
        "PORSİYONLAR": [
            { name: "Adana Porsiyon", price: 420 },
            { name: "Urfa Porsiyon", price: 420 },
            { name: "Tavuk Porsiyon", price: 420 },
            { name: "Kanat Porsiyon", price: 420 },
            { name: "Et Şiş Porsiyon", price: 460 }
        ],
        "İÇECEKLER": [
            { name: "Küçük Ayran", price: 30 },
            { name: "Büyük Ayran", price: 40 },
            { name: "Kola/Fanta", price: 60 },
            { name: "Şalgam", price: 40 },
            { name: "Soda Çeşitleri", price: 30 },
            { name: "Su", price: 15 }
        ]
    };

    let cart = [];
    let totalPrice = 0;

    function renderMenu() {
        const container = document.getElementById('menu-container');
        for (let cat in menu) {
            container.innerHTML += `<div class="category-title">${cat}</div>`;
            menu[cat].forEach(item => {
                container.innerHTML += `
                    <div class="item-card">
                        <div class="item-info">
                            <h4>${item.name}</h4>
                            <p>${item.price} TL</p>
                        </div>
                        <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">+</button>
                    </div>`;
            });
        }
    }

    function addToCart(name, price) {
        cart.push({name, price});
        totalPrice += price;
        updateCart();
    }

    function updateCart() {
        document.getElementById('count').innerText = cart.length;
        document.getElementById('total').innerText = totalPrice + " TL";
    }

    function sendWhatsApp() {
        if(cart.length === 0) {
            alert("Lütfen önce sepete ürün ekleyin!");
            return;
        }
        let message = "*Sultan Murat Dürümcüsü Siparişi*\n--------------------------\n";
        cart.forEach((item, index) => {
            message += `${index + 1}. ${item.name} - ${item.price} TL\n`;
        });
        message += "--------------------------\n";
        message += `*TOPLAM TUTAR: ${totalPrice} TL*`;
        
        // Numaranız otomatik eklendi: 905466122000
        const whatsappLink = `https://wa.me/905466122000?text=${encodeURIComponent(message)}`;
        window.open(whatsappLink, '_blank');
    }

    renderMenu();
</script>

</body>
</html>
