<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sultan Murat Dürümcüsü</title>
    <style>
        :root { --primary: #a34e25; --bg: #fff5eb; --card: #ffffff; --green: #2ecc71; --red: #e74c3c; --text: #2c3e50; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background-color: var(--bg); color: var(--text); padding-bottom: 120px; }
        
        .header { background: linear-gradient(135deg, var(--primary), #7a3a1b); color: white; text-align: center; padding: 45px 20px; border-radius: 0 0 40px 40px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .logo-circle { background: white; width: 85px; height: 85px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: var(--primary); font-size: 42px; font-weight: 900; }
        
        .container { padding: 0 15px; max-width: 550px; margin: auto; }
        .category-title { border-left: 6px solid var(--primary); padding-left: 15px; margin: 35px 0 20px; font-weight: 800; color: var(--primary); font-size: 22px; text-transform: uppercase; }

        .item-card { background: var(--card); border-radius: 25px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.04); border: 1px solid rgba(163, 78, 37, 0.05); }
        .item-header { display: flex; justify-content: space-between; align-items: center; }
        .item-info h4 { margin: 0; font-size: 19px; font-weight: 700; color: #1a1a1a; }
        .item-info p { margin: 5px 0 0; color: var(--primary); font-weight: 700; font-size: 18px; }

        /* + ve - Buton Renkleri */
        .controls { display: flex; align-items: center; gap: 15px; background: #f8f9fa; padding: 5px 10px; border-radius: 15px; }
        .btn-plus { background: var(--green); color: white; border: none; width: 40px; height: 40px; border-radius: 12px; font-size: 24px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); }
        .btn-minus { background: var(--red); color: white; border: none; width: 40px; height: 40px; border-radius: 12px; font-size: 24px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); }
        .qty-label { font-size: 20px; font-weight: 800; min-width: 25px; text-align: center; }

        .options-row { display: flex; gap: 10px; margin-top: 15px; }
        .opt-btn { background: #f0f2f5; border: 1px solid #e0e0e0; padding: 10px; border-radius: 12px; font-size: 14px; font-weight: 700; color: #555; cursor: pointer; flex: 1; }
        .opt-btn.active { background: #3498db; color: white; border-color: #3498db; }

        .item-note-input { width: 100%; margin-top: 15px; border: 1px solid #eee; border-radius: 10px; padding: 10px; font-size: 13px; background: #fafafa; box-sizing: border-box; }

        /* Adres Alanı */
        .address-box { background: white; border-radius: 25px; padding: 20px; border: 2px solid #ddd; margin: 30px 0; }
        .address-box textarea { width: 100%; border: none; font-family: inherit; font-size: 15px; outline: none; resize: none; }
        .address-box.error { border-color: var(--red); background: #fff5f5; }

        .cart-bar { position: fixed; bottom: 25px; left: 15px; right: 15px; background: #1a1a1a; padding: 22px; border-radius: 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); cursor: pointer; max-width: 500px; margin: auto; z-index: 1000; color: white; }
        .cart-total { color: var(--green); font-weight: 900; font-size: 22px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 100%; max-width: 450px; border-radius: 35px; padding: 30px; max-height: 85vh; overflow-y: auto; }
        .summary-item { border-bottom: 1px solid #f0f0f0; padding: 12px 0; }
        .confirm-btn { background: var(--green); color: white; border: none; padding: 18px; border-radius: 20px; font-weight: 800; cursor: pointer; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-circle">S</div>
    <h1>SULTAN MURAT DÜRÜMCÜSÜ</h1>
    <p>Geleneksel Lezzet, Modern Sunum</p>
</div>

<div class="container" id="menu-items"></div>

<div class="container">
    <div class="category-title">AÇIK ADRESİNİZ</div>
    <div class="address-box" id="addr-box">
        <textarea id="customer-address" rows="3" placeholder="Lütfen açık adresinizi yazın (Kapı no, kat vb. belirtin)..."></textarea>
    </div>
</div>

<div class="cart-bar" onclick="showSummary()">
    <div style="font-weight: 800; font-size: 18px;">🛒 SEPETİM (<span id="cart-count">0</span>)</div>
    <div id="cart-total" class="cart-total">0 TL</div>
</div>

<div id="summary-modal" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center; margin-top:0;">Sipariş Onayı</h2>
        <div id="summary-list"></div>
        <div id="summary-addr" style="margin-top:15px; padding:10px; background:#f9f9f9; border-radius:10px; font-size:14px; border-left:4px solid var(--primary);"></div>
        <div style="margin-top:25px; display:flex; justify-content:space-between; font-size:22px; font-weight:900; border-top: 2px solid #eee; padding-top: 15px;">
            <span>TOPLAM:</span><span id="summary-total" style="color:var(--green);">0 TL</span>
        </div>
        <div style="display:flex; flex-direction:column; gap:12px; margin-top:20px;">
            <button class="confirm-btn" onclick="sendWhatsApp()">Onayla ve WhatsApp'a Gönder</button>
            <button style="background:none; border:none; color:#999; cursor:pointer; font-weight:bold;" onclick="closeSummary()">Kapat ve Düzenle</button>
        </div>
    </div>
</div>

<script>
    const menuData = [
        { cat: "ÇORBALAR", items: [{ id: 1, name: "Mercimek Çorbası", price: 100 }, { id: 2, name: "Az Mercimek Çorbası", price: 50 }]},
        { cat: "DÜRÜMLER", items: [{ id: 3, name: "Adana Dürüm", price: 210, type: "duble" }, { id: 4, name: "Urfa Dürüm", price: 210, type: "duble" }, { id: 5, name: "Tavuk Dürüm", price: 210, type: "duble" }, { id: 6, name: "Et Dürüm (Şiş)", price: 230, type: "duble" }]},
        { cat: "PORSİYONLAR", items: [{ id: 7, name: "Adana Porsiyon", price: 420, type: "1.5" }, { id: 8, name: "Urfa Porsiyon", price: 420, type: "1.5" }, { id: 9, name: "Tavuk Porsiyon", price: 420, type: "1.5" }, { id: 10, name: "Kanat Porsiyon", price: 420, type: "1.5" }, { id: 11, name: "Et Şiş Porsiyon", price: 460, type: "1.5" }]},
        { cat: "İÇECEKLER", items: [{ id: 12, name: "Küçük Ayran", price: 30 }, { id: 13, name: "Büyük Ayran", price: 40 }, { id: 14, name: "Kola/Fanta (330ml)", price: 60 }, { id: 15, name: "1 Litre Kola", price: 100 }, { id: 16, name: "Şalgam", price: 40 }, { id: 17, name: "Su", price: 15 }]}
    ];

    let cart = {};
    let itemSelections = {};

    function init() {
        const container = document.getElementById('menu-items');
        menuData.forEach(section => {
            container.innerHTML += `<div class="category-title">${section.cat}</div>`;
            section.items.forEach(item => {
                itemSelections[item.id] = { isExtra: false };
                let opts = item.type === "duble" ? `<div class="options-row"><button class="opt-btn active" onclick="setOpt(${item.id},false)">Tek</button><button class="opt-btn" onclick="setOpt(${item.id},true)">Duble</button></div>` : 
                           item.type === "1.5" ? `<div class="options-row"><button class="opt-btn active" onclick="setOpt(${item.id},false)">1 Pors.</button><button class="opt-btn" onclick="setOpt(${item.id},true)">1.5 Pors.</button></div>` : "";
                
                let noteInput = (section.cat === "DÜRÜMLER" || section.cat === "PORSİYONLAR") ? 
                                `<input type="text" class="item-note-input" id="note-${item.id}" placeholder="Ürün notu (Örn: Soğansız)..." onchange="syncNote(${item.id})">` : "";

                container.innerHTML += `
                    <div class="item-card">
                        <div class="item-header">
                            <div class="item-info"><h4>${item.name}</h4><p id="p-${item.id}">${item.price} TL</p></div>
                            <div class="controls">
                                <button class="btn-minus" onclick="upd(${item.id},-1)">-</button>
                                <span class="qty-label" id="q-${item.id}">0</span>
                                <button class="btn-plus" onclick="upd(${item.id},1)">+</button>
                            </div>
                        </div>
                        ${opts}
                        ${noteInput}
                    </div>`;
            });
        });
    }

    function syncNote(id) { if(cart[id]) cart[id].note = document.getElementById(`note-${id}`).value; }

    function setOpt(id, isEx) {
        itemSelections[id].isExtra = isEx;
        const it = findIt(id);
        const card = document.getElementById(`p-${id}`).closest('.item-card');
        card.querySelectorAll('.opt-btn').forEach((b,i) => b.classList.toggle('active', i=== (isEx?1:0)));
        let pr = isEx ? (it.type==="duble"?420:630) : it.price;
        if(it.name.includes("Et") && isEx) pr += it.type==="duble"?40:60;
        document.getElementById(`p-${id}`).innerText = pr + " TL";
        if(cart[id]) { cart[id].price = pr; cart[id].name = it.name + (isEx?(it.type==="duble"?" (Duble)":" (1.5)"): ""); renderC(); }
    }

    function findIt(id) { for(let s of menuData) { let i = s.items.find(x=>x.id===id); if(i) return i; } }

    function upd(id, ch) {
        if(!cart[id]) {
            const it = findIt(id), isEx = itemSelections[id].isExtra;
            let pr = isEx ? (it.type==="duble"?420:630) : it.price;
            if(it.name.includes("Et") && isEx) pr += it.type==="duble"?40:60;
            cart[id] = { qty: 0, name: it.name + (isEx?(it.type==="duble"?" (Duble)":" (1.5)"): ""), price: pr, note: document.getElementById(`note-${id}`) ? document.getElementById(`note-${id}`).value : "" };
        }
        cart[id].qty += ch;
        if(cart[id].qty <= 0) { delete cart[id]; document.getElementById(`q-${id}`).innerText = 0; }
        else { document.getElementById(`q-${id}`).innerText = cart[id].qty; }
        renderC();
    }

    function renderC() {
        let t=0, c=0; for(let i in cart) { t += cart[i].price * cart[i].qty; c += cart[i].qty; }
        document.getElementById('cart-total').innerText = t + " TL";
        document.getElementById('cart-count').innerText = c;
    }

    function showSummary() {
        const addr = document.getElementById('customer-address').value.trim();
        if(!addr) { 
            alert("Lütfen teslimat adresi giriniz!"); 
            document.getElementById('addr-box').classList.add('error');
            document.getElementById('customer-address').focus();
            return; 
        }
        document.getElementById('addr-box').classList.remove('error');
        
        let list = document.getElementById('summary-list'), t=0, has=false;
        list.innerHTML = "";
        for(let i in cart) {
            has = true;
            t += cart[i].price * cart[i].qty;
            list.innerHTML += `<div class="summary-item"><div style="display:flex; justify-content:space-between;"><b>${cart[i].qty} x ${cart[i].name}</b><span>${cart[i].price * cart[i].qty} TL</span></div>${cart[i].note ? `<p style="margin:5px 0 0; color:#e67e22; font-style:italic; font-size:13px;">— ${cart[i].note}</p>` : ""}</div>`;
        }
        if(!has) return alert("Sepetiniz boş!");
        document.getElementById('summary-total').innerText = t + " TL";
        document.getElementById('summary-addr').innerText = "📍 Adres: " + addr;
        document.getElementById('summary-modal').style.display = "flex";
    }

    function closeSummary() { document.getElementById('summary-modal').style.display = "none"; }

    function sendWhatsApp() {
        let t=0, msg = "*Sultan Murat Dürümcüsü Siparişi*\n\n";
        for(let i in cart) { msg += `• ${cart[i].qty} x ${cart[i].name} - ${cart[i].price * cart[i].qty} TL\n${cart[i].note ? `  (Not: ${cart[i].note})\n` : ""}`; t += cart[i].price * cart[i].qty; }
        msg += `\n📍 *Adres:* ${document.getElementById('customer-address').value}`;
        msg += `\n\n*Toplam:* ${t} TL`;
        window.open(`https://wa.me/905466122000?text=${encodeURIComponent(msg)}`);
        closeSummary();
    }
    init();
</script>
</body>
</html>
